name: CD Clipor

on:
  workflow_run:
    workflows: ['CI Clipor']
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. clipor-v0.2.0)'
        required: true

jobs:
  # Build job — only runs on manual dispatch (CI trigger already has artifacts)
  build:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    defaults:
      run:
        working-directory: clipor

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: clipor/src-tauri

      - run: npm ci

      - name: Frontend tests
        run: npm test

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: clipor-build
          path: |
            clipor/src-tauri/target/release/clipor.exe
            clipor/src-tauri/target/release/bundle/msi/*.msi
            clipor/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore

  # Release job
  release:
    # When triggered by workflow_run, build is skipped — use if/always to proceed
    needs: [build]
    if: always()
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: read

    steps:
      # Gate: only proceed for valid triggers
      - name: Check trigger conditions
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
              echo "CI did not succeed, skipping release"
              exit 1
            fi
            if [[ ! "${{ github.event.workflow_run.head_branch }}" == clipor-v* ]]; then
              echo "Not a release tag, skipping"
              exit 1
            fi
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ needs.build.result }}" != "success" ]; then
              echo "Build failed, skipping release"
              exit 1
            fi
          fi

      - uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: clipor-build
          path: artifacts
          run-id: ${{ github.event_name == 'workflow_dispatch' && github.run_id || github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: 'Clipor ${{ steps.tag.outputs.name }}'
          body: |
            ## Clipor ${{ steps.tag.outputs.name }}

            ### Downloads
            - **MSI**: Windows Installer (推奨)
            - **NSIS**: セットアップ実行ファイル
            - **EXE**: ポータブル実行ファイル

            ### Changes
            See [commit history](https://github.com/${{ github.repository }}/commits/${{ steps.tag.outputs.name }}) for details.
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sign:
    needs: release
    if: ${{ vars.SIGNPATH_ENABLED == 'true' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      actions: read

    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.workflow_run.head_branch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Submit signing request to SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: 'clipor'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'windows-installer'
          github-artifact-id: '${{ needs.release.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'signed-artifacts'

      - name: Upload signed artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          files: signed-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
