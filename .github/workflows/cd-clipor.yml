name: CD Clipor

on:
  workflow_run:
    workflows: ['CI Clipor']
    types:
      - completed
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && startsWith(github.event.workflow_run.head_branch, 'clipor-v')

    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: clipor-build
          path: artifacts
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          name: 'Clipor ${{ github.event.workflow_run.head_branch }}'
          body: |
            ## Clipor ${{ github.event.workflow_run.head_branch }}

            ### Downloads
            - **MSI**: Windows Installer (推奨)
            - **NSIS**: セットアップ実行ファイル
            - **EXE**: ポータブル実行ファイル

            ### Changes
            See [commit history](https://github.com/${{ github.repository }}/commits/${{ github.event.workflow_run.head_branch }}) for details.
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sign:
    needs: release
    if: ${{ vars.SIGNPATH_ENABLED == 'true' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      actions: read

    steps:
      - name: Submit signing request to SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: 'clipor'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'windows-installer'
          github-artifact-id: '${{ needs.release.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'signed-artifacts'

      - name: Upload signed artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.workflow_run.head_branch }}
          files: signed-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
