name: CD Clipor

on:
  workflow_run:
    workflows: ['CI Clipor']
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0)'
        required: true

jobs:
  # Build job — only runs on manual dispatch (CI trigger already has artifacts)
  build:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    outputs:
      artifact_id: ${{ steps.upload_build_artifacts.outputs.artifact-id }}
    defaults:
      run:
        working-directory: clipor

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: clipor/src-tauri

      - run: npm ci

      - name: Frontend tests
        run: npm test

      - name: Sync app version from release tag
        run: node scripts/sync-version.mjs ${{ inputs.tag }}

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload build artifacts
        id: upload_build_artifacts
        uses: actions/upload-artifact@v5
        with:
          name: clipor-build
          path: |
            clipor/src-tauri/target/release/clipor.exe
            clipor/src-tauri/target/release/bundle/msi/*.msi
            clipor/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore

  prepare_release:
    needs: [build]
    if: always()
    runs-on: ubuntu-latest

    outputs:
      should_release: ${{ steps.gate.outputs.should_release }}
      tag: ${{ steps.gate.outputs.tag }}
      artifact_run_id: ${{ steps.gate.outputs.artifact_run_id }}

    steps:
      - name: Resolve release context
        id: gate
        shell: bash
        run: |
          should_release=false
          tag=
          artifact_run_id=

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" = "success" ] && [[ "${{ github.event.workflow_run.head_branch }}" == v* ]]; then
              should_release=true
              tag="${{ github.event.workflow_run.head_branch }}"
              artifact_run_id="${{ github.event.workflow_run.id }}"
            else
              echo "Skipping release for workflow_run: conclusion=${{ github.event.workflow_run.conclusion }}, ref=${{ github.event.workflow_run.head_branch }}"
            fi
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ needs.build.result }}" = "success" ] && [[ "${{ inputs.tag }}" == v* ]]; then
              should_release=true
              tag="${{ inputs.tag }}"
              artifact_run_id="${{ github.run_id }}"
            else
              echo "Skipping release for workflow_dispatch: build=${{ needs.build.result }}, tag=${{ inputs.tag }}"
            fi
          fi

          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "artifact_run_id=$artifact_run_id" >> "$GITHUB_OUTPUT"

  # Release job
  release:
    needs: [build, prepare_release]
    if: needs.prepare_release.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: clipor-build
          path: artifacts
          run-id: ${{ needs.prepare_release.outputs.artifact_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.tag }}
          name: 'Clipor ${{ needs.prepare_release.outputs.tag }}'
          body: |
            ## Clipor ${{ needs.prepare_release.outputs.tag }}

            ### Downloads
            - **MSI**: Windows Installer (推奨)
            - **NSIS**: セットアップ実行ファイル
            - **EXE**: ポータブル実行ファイル

            ### Changes
            See [commit history](https://github.com/${{ github.repository }}/commits/${{ needs.prepare_release.outputs.tag }}) for details.
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload_cloudflare_r2:
    needs: [build, release, prepare_release]
    if: ${{ needs.prepare_release.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    environment: prd

    permissions:
      actions: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: clipor-build
          path: artifacts
          run-id: ${{ needs.prepare_release.outputs.artifact_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EXE and MSI to Cloudflare R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
          RELEASE_TAG: ${{ needs.prepare_release.outputs.tag }}
        run: |
          set -euo pipefail

          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ] || [ -z "${R2_ACCOUNT_ID:-}" ] || [ -z "${R2_BUCKET_NAME:-}" ]; then
            echo "Cloudflare R2 environment is not fully configured. Skipping upload."
            exit 0
          fi

          DESTINATION="s3://${R2_BUCKET_NAME}/${RELEASE_TAG}/"
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          echo "Uploading release binaries to ${DESTINATION}"
          aws s3 cp artifacts/ "$DESTINATION" \
            --recursive \
            --exclude "*" \
            --include "*.msi" \
            --include "*.exe" \
            --include "*.msix" \
            --endpoint-url "$ENDPOINT" \
            --no-progress

  update_release_links:
    needs: [build, release, upload_cloudflare_r2, prepare_release]
    if: ${{ needs.prepare_release.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    environment: prd

    permissions:
      contents: write

    steps:
      - name: Build release notes with Cloudflare R2 links
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare_release.outputs.tag }}
          R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}
        run: |
          set -euo pipefail

          VERSION="${RELEASE_TAG#v}"
          BASE_URL="${R2_PUBLIC_BASE_URL%/}"

          cat > release-body.md <<EOF
          ## Clipor ${RELEASE_TAG}

          ### Downloads
          - **MSI**: Windows Installer (推奨)
          - **NSIS**: セットアップ実行ファイル
          - **EXE**: ポータブル実行ファイル
          EOF

          if [ -n "${BASE_URL}" ]; then
            cat >> release-body.md <<EOF

          ### Direct Downloads (Cloudflare R2)
          - [MSI (en-US)](${BASE_URL}/${RELEASE_TAG}/Clipor_${VERSION}_x64_en-US.msi)
          - [MSI (ja-JP)](${BASE_URL}/${RELEASE_TAG}/Clipor_${VERSION}_x64_ja-JP.msi)
          - [MSIX Package](${BASE_URL}/${RELEASE_TAG}/Clipor_${VERSION}_x64_en-US.msix)
          - [NSIS Setup](${BASE_URL}/${RELEASE_TAG}/Clipor_${VERSION}_x64-setup.exe)
          - [Portable EXE](${BASE_URL}/${RELEASE_TAG}/clipor.exe)
          EOF
          fi

          cat >> release-body.md <<EOF

          ### Changes
          See [commit history](https://github.com/${{ github.repository }}/commits/${RELEASE_TAG}) for details.
          EOF

      - name: Update GitHub Release body
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.tag }}
          body_path: release-body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
