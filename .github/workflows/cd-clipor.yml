name: CD Clipor

on:
  workflow_run:
    workflows: ['CI Clipor']
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.0)'
        required: true

jobs:
  # Build job — only runs on manual dispatch (CI trigger already has artifacts)
  build:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    outputs:
      artifact_id: ${{ steps.upload_build_artifacts.outputs.artifact-id }}
    defaults:
      run:
        working-directory: clipor

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: clipor/src-tauri

      - run: npm ci

      - name: Frontend tests
        run: npm test

      - name: Build Tauri app
        run: npx tauri build

      - name: Upload build artifacts
        id: upload_build_artifacts
        uses: actions/upload-artifact@v5
        with:
          name: clipor-build
          path: |
            clipor/src-tauri/target/release/clipor.exe
            clipor/src-tauri/target/release/bundle/msi/*.msi
            clipor/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore

  prepare_release:
    needs: [build]
    if: always()
    runs-on: ubuntu-latest

    outputs:
      should_release: ${{ steps.gate.outputs.should_release }}
      tag: ${{ steps.gate.outputs.tag }}
      artifact_run_id: ${{ steps.gate.outputs.artifact_run_id }}

    steps:
      - name: Resolve release context
        id: gate
        shell: bash
        run: |
          should_release=false
          tag=
          artifact_run_id=

          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" = "success" ] && [[ "${{ github.event.workflow_run.head_branch }}" == v* ]]; then
              should_release=true
              tag="${{ github.event.workflow_run.head_branch }}"
              artifact_run_id="${{ github.event.workflow_run.id }}"
            else
              echo "Skipping release for workflow_run: conclusion=${{ github.event.workflow_run.conclusion }}, ref=${{ github.event.workflow_run.head_branch }}"
            fi
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ needs.build.result }}" = "success" ] && [[ "${{ inputs.tag }}" == v* ]]; then
              should_release=true
              tag="${{ inputs.tag }}"
              artifact_run_id="${{ github.run_id }}"
            else
              echo "Skipping release for workflow_dispatch: build=${{ needs.build.result }}, tag=${{ inputs.tag }}"
            fi
          fi

          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "artifact_run_id=$artifact_run_id" >> "$GITHUB_OUTPUT"

  # Release job
  release:
    needs: [build, prepare_release]
    if: needs.prepare_release.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v5

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: clipor-build
          path: artifacts
          run-id: ${{ needs.prepare_release.outputs.artifact_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.tag }}
          name: 'Clipor ${{ needs.prepare_release.outputs.tag }}'
          body: |
            ## Clipor ${{ needs.prepare_release.outputs.tag }}

            ### Downloads
            - **MSI**: Windows Installer (推奨)
            - **NSIS**: セットアップ実行ファイル
            - **EXE**: ポータブル実行ファイル

            ### Changes
            See [commit history](https://github.com/${{ github.repository }}/commits/${{ needs.prepare_release.outputs.tag }}) for details.
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sign:
    needs: [build, release, prepare_release]
    if: ${{ vars.SIGNPATH_ENABLED == 'true' && github.event_name == 'workflow_dispatch' && needs.build.outputs.artifact_id != '' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write
      actions: read

    steps:
      - name: Submit signing request to SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORGANIZATION_ID }}'
          project-slug: 'clipor'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'windows-installer'
          github-artifact-id: '${{ needs.build.outputs.artifact_id }}'
          wait-for-completion: true
          output-artifact-directory: 'signed-artifacts'

      - name: Upload signed artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.tag }}
          files: signed-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
