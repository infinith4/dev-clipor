name: CI Clipor

on:
  push:
    branches:
      - main
    paths:
      - 'clipor/**'
      - '.github/workflows/ci-clipor.yml'

jobs:
  ci:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: clipor

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: clipor/src-tauri

      - run: npm ci

      # Frontend tests
      - name: Frontend tests
        run: npm test

      # Frontend type check & build
      - name: Frontend build
        run: npm run build

      # Rust check & tests
      - name: Rust check
        run: cargo check
        working-directory: clipor/src-tauri

      - name: Rust tests
        run: cargo test
        working-directory: clipor/src-tauri

      # Full Tauri build
      - name: Build Tauri app
        run: npx tauri build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: clipor-ci-build
          path: |
            clipor/src-tauri/target/release/clipor.exe
            clipor/src-tauri/target/release/bundle/msi/*.msi
            clipor/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore
          retention-days: 7
