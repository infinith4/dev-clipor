name: CI Clipor

on:
  push:
    branches:
      - main
    paths:
      - 'clipor/**'
      - '.github/workflows/ci-clipor.yml'
  pull_request:
    paths:
      - 'clipor/**'

jobs:
  ci:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: clipor

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: clipor/src-tauri

      - run: npm ci

      - name: Frontend tests
        run: npm test

      - name: Frontend build
        run: npm run build

      - name: Rust check
        run: cargo check
        working-directory: clipor/src-tauri

      - name: Rust tests
        run: cargo test
        working-directory: clipor/src-tauri
