name: CI Clipor

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'clipor/**'
      - '.github/workflows/ci-clipor.yml'
  pull_request:
    paths:
      - 'clipor/**'

permissions:
  contents: write

jobs:
  ci:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: clipor

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: clipor/src-tauri

      - run: npm ci

      - name: Frontend tests with coverage
        run: npm run test:coverage

      - name: Sync app version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/sync-version.mjs ${{ github.ref_name }}

      - name: Generate coverage badges
        shell: bash
        run: |
          # Read coverage-summary.json
          SUMMARY="coverage/coverage-summary.json"
          if [ ! -f "$SUMMARY" ]; then
            echo "Coverage summary not found"
            exit 0
          fi

          # Extract percentages
          STATEMENTS=$(node -e "const s=require('./$SUMMARY');console.log(s.total.statements.pct)")
          BRANCHES=$(node -e "const s=require('./$SUMMARY');console.log(s.total.branches.pct)")
          FUNCTIONS=$(node -e "const s=require('./$SUMMARY');console.log(s.total.functions.pct)")

          echo "C0 (Statements): ${STATEMENTS}%"
          echo "C1 (Branches): ${BRANCHES}%"
          echo "C2 (Functions): ${FUNCTIONS}%"

          # Determine badge color based on percentage
          badge_color() {
            local pct=$1
            if (( $(echo "$pct >= 80" | bc -l) )); then echo "brightgreen"
            elif (( $(echo "$pct >= 60" | bc -l) )); then echo "yellow"
            elif (( $(echo "$pct >= 40" | bc -l) )); then echo "orange"
            else echo "red"
            fi
          }

          C0_COLOR=$(badge_color "$STATEMENTS")
          C1_COLOR=$(badge_color "$BRANCHES")
          C2_COLOR=$(badge_color "$FUNCTIONS")

          # Create badges directory
          mkdir -p ../badges

          # Generate badge JSON files (for shields.io endpoint)
          cat > ../badges/c0-coverage.json <<EOF
          { "schemaVersion": 1, "label": "C0 (statements)", "message": "${STATEMENTS}%", "color": "${C0_COLOR}" }
          EOF
          cat > ../badges/c1-coverage.json <<EOF
          { "schemaVersion": 1, "label": "C1 (branches)", "message": "${BRANCHES}%", "color": "${C1_COLOR}" }
          EOF
          cat > ../badges/c2-coverage.json <<EOF
          { "schemaVersion": 1, "label": "C2 (functions)", "message": "${FUNCTIONS}%", "color": "${C2_COLOR}" }
          EOF

      - name: Deploy coverage badges
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        shell: bash
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create or switch to gh-pages-badges branch
          git fetch origin gh-pages-badges || true
          if git rev-parse --verify origin/gh-pages-badges >/dev/null 2>&1; then
            git checkout gh-pages-badges
          else
            git checkout --orphan gh-pages-badges
            git rm -rf . || true
          fi

          # Copy badge files
          cp -f badges/*.json . 2>/dev/null || true

          git add *.json
          if git diff --cached --quiet; then
            echo "No badge changes"
          else
            git commit -m "Update coverage badges"
            git push origin gh-pages-badges
          fi

          # Switch back
          git checkout -

      - name: Frontend build
        run: npm run build

      - name: Rust check
        run: cargo check
        working-directory: clipor/src-tauri

      - name: Rust tests
        run: cargo test
        working-directory: clipor/src-tauri

      - name: Build Tauri app
        run: npx tauri build

      - name: Build MSIX package
        shell: pwsh
        working-directory: clipor
        run: |
          # Read version from tauri.conf.json (already synced for v* tags)
          $tauriConf = Get-Content "src-tauri\tauri.conf.json" | ConvertFrom-Json
          $semver    = $tauriConf.version
          $version   = "$semver.0"   # MSIX requires 4-part version (X.Y.Z.0)
          $appName   = "Clipor_${semver}_x64"

          # Publisher DN — set MSIX_PUBLISHER_DN in repo variables for Store submission
          # Partner Center > Account settings > Legal info > Publisher identity
          $publisher = "${{ vars.MSIX_PUBLISHER_DN }}"
          if (-not $publisher) { $publisher = "CN=Clipor" }

          # Staging layout expected by AppxManifest.xml
          $staging = "msix-staging"
          New-Item -ItemType Directory -Path "$staging\assets" -Force | Out-Null

          # Executable (already built by tauri build)
          Copy-Item "src-tauri\target\release\clipor.exe" "$staging\"

          # Icon assets referenced in AppxManifest.xml
          $icons = @(
            "StoreLogo.png",
            "Square44x44Logo.png",
            "Square71x71Logo.png",
            "Square150x150Logo.png",
            "Square310x310Logo.png"
          )
          foreach ($icon in $icons) {
            Copy-Item "src-tauri\icons\$icon" "$staging\assets\" -ErrorAction Stop
          }

          # Inject version and publisher into manifest
          $manifest = Get-Content "src-tauri\AppxManifest.xml" -Raw
          $manifest = $manifest -replace "VERSION_PLACEHOLDER", $version
          $manifest = $manifest -replace "PUBLISHER_PLACEHOLDER", $publisher
          Set-Content "$staging\AppxManifest.xml" $manifest -Encoding UTF8

          # Locate makeappx.exe (part of Windows SDK, pre-installed on windows-latest)
          $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter makeappx.exe |
                        Where-Object { $_.FullName -match "x64" } |
                        Select-Object -Last 1 -ExpandProperty FullName
          if (-not $makeappx) { throw "makeappx.exe not found" }

          # Output directory mirrors Tauri bundle layout for consistent artifact paths
          New-Item -ItemType Directory -Path "src-tauri\target\release\bundle\msix" -Force | Out-Null
          $out = "src-tauri\target\release\bundle\msix\$appName.msix"

          & $makeappx pack /d $staging /p $out /overwrite
          if ($LASTEXITCODE -ne 0) { throw "makeappx failed" }
          Write-Host "MSIX created: $out"

      - name: Import code signing certificate
        if: startsWith(github.ref, 'refs/tags/v') && env.CODE_SIGNING_CERT_BASE64 != ''
        env:
          CODE_SIGNING_CERT_BASE64: ${{ secrets.CODE_SIGNING_CERT_BASE64 }}
          CODE_SIGNING_CERT_PASSWORD: ${{ secrets.CODE_SIGNING_CERT_PASSWORD }}
        shell: pwsh
        run: |
          $pfxBytes = [System.Convert]::FromBase64String($env:CODE_SIGNING_CERT_BASE64)
          $pfxPath  = "$env:TEMP\codesign.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
          $pwd = ConvertTo-SecureString $env:CODE_SIGNING_CERT_PASSWORD -AsPlainText -Force
          Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation "Cert:\CurrentUser\My" -Password $pwd
          Remove-Item $pfxPath

      - name: Sign release binaries (MSI / EXE)
        if: startsWith(github.ref, 'refs/tags/v') && env.CODE_SIGNING_CERT_BASE64 != ''
        env:
          CODE_SIGNING_CERT_BASE64: ${{ secrets.CODE_SIGNING_CERT_BASE64 }}
        shell: pwsh
        working-directory: clipor
        run: |
          $signtool = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe | Select-Object -Last 1).FullName
          $files = @("src-tauri\target\release\clipor.exe") `
                 + (Get-ChildItem "src-tauri\target\release\bundle\msi\*.msi").FullName `
                 + (Get-ChildItem "src-tauri\target\release\bundle\nsis\*.exe").FullName `
                 + (Get-ChildItem "src-tauri\target\release\bundle\msix\*.msix").FullName
          foreach ($f in $files) {
            if (Test-Path $f) {
              & $signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /a "$f"
              if ($LASTEXITCODE -ne 0) { throw "signtool failed: $f" }
              Write-Host "Signed: $f"
            }
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: clipor-build
          path: |
            clipor/src-tauri/target/release/clipor.exe
            clipor/src-tauri/target/release/bundle/msi/*.msi
            clipor/src-tauri/target/release/bundle/nsis/*.exe
            clipor/src-tauri/target/release/bundle/msix/*.msix
          if-no-files-found: ignore
          retention-days: 7
